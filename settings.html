<!DOCTYPE html>
<html>
    <head>
        <title>MeowClicker</title>
        <meta charset="UTF-8">
        <meta name="description" content="Simple clicker game">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="keywords" content="Cliker, cats, game, webgame">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">   
    </head>
    <body>
        <h2 style="text-align: center;" class="title">Settings</h2>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script src="src/settings.js"></script>
        <div style="display: flex; justify-content: flex-start;">
            <a href="index.html" class="button is-primary"
                style="display: inline-flex; align-items: center; justify-content: center; padding: 12px; left: 10px; width: 110px; height: 56px;">
                <i class="fa fa-solid fa-arrow-left"></i>
                <p style="font-family: monospace; padding: 8px;">Go back</p>
        </a>
        </div>

        <footer style="position: fixed; bottom: 0; left: 0; width: 100%;">
        <div style="display: flex; justify-content: flex-end;">
            <button onclick="reset_progress()" class="button is-danger"
                style="display: inline-flex; align-items: center; justify-content: center; padding: 12px; right: 10px; bottom: 10px; width: 220px; height: 56px;">
                <i class="fa fa-solid fa-trash"></i>
                <p style="font-family: monospace; padding: 8px;">Delete all data</p>
        </button>
        </div>
    </footer>
    </body>
</html>
