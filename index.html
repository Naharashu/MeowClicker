<!DOCTYPE html>
<html>

<head>
    <title>MeowClicker</title>
    <meta charset="UTF-8">
    <meta name="description" content="Simple clicker game">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="Cliker, cats, game, webgame">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>

<body>
    <div  style="display: flex; flex-direction: row; justify-content: center; align-items: center">
        <h2 class="title">Meow clicker</h2>
        <h2>V0.2</h2>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="src/index.js"></script>
    <h2 id="score" style="margin: 0 auto; text-align: center; font-size: 64px;;">0</h2>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <!--
        <button onclick="play()" style="border-radius: 50%; height:150px; width: 150px;" class="button is-success">
            Click
        </button>
        -->
        <img class="img" id="play-btn" src="resourse/img/button.png" alt="paw button lol" style="width: 256px; height: 256px;" onclick="play()">
    </div>
    <footer style="position: fixed; bottom: 10px; left: 0; width: 100%;">
        <div style="display: flex; justify-content: flex-end;">
            <a href="shop.html" class="button is-info is-dark"
                style="display: inline-flex; align-items: center; justify-content: center; padding: 12px; top: 10px; right: 10px; width: 56px; height: 56px;">
                <i style="font-size: 20px;" class="fas fa-sharp fa-regular fa-cart-shopping"></i>
            </a>
        </div>
        <br>
        <div style="display: flex; justify-content: flex-end;">
            <a href="thanks_to.html" class="button is-info is-dark"
                style="display: inline-flex; align-items: center; justify-content: center; padding: 12px; top: 10px; right: 10px; width: 56px; height: 56px;">
                <i class="fa fa-duotone fa-solid fa-heart"
                    style="font-size: 22px; --fa-primary-color: rgb(255, 41, 41); --fa-secondary-color: rgb(252, 51, 51);"></i>
            </a>
        </div>
        <br>
        <div style="display: flex; justify-content: flex-end;">
            <a href="settings.html" class="button is-primary"
                style="display: inline-flex; align-items: center; justify-content: center; padding: 12px; right: 10px; width: 56px; height: 56px;">
                <i class="fa fa-gear" style="font-size: 32px;"></i>
            </a>
        </div>
    </footer>

</body>

</html>
